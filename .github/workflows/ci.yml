name: CI

on:
  push:
  pull_request:

jobs:
  build-and-check:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run checks
        run: swift run CodexUsageCoreChecks
